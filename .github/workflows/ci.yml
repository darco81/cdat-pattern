name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (cdat-utils)
        working-directory: packages/cdat-utils
        run: npm ci

      - name: Type check (cdat-utils)
        working-directory: packages/cdat-utils
        run: npm run typecheck

      - name: Install dependencies (basic example)
        working-directory: examples/basic
        run: npm ci

      - name: Type check (basic example)
        working-directory: examples/basic
        run: npm run typecheck

      - name: Install dependencies (e-commerce example)
        working-directory: examples/e-commerce
        run: npm ci

      - name: Type check (e-commerce example)
        working-directory: examples/e-commerce
        run: npm run typecheck

  test-basic:
    name: Test Basic Example
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: examples/basic
        run: npm ci

      - name: Install Playwright browsers
        working-directory: examples/basic
        run: npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: examples/basic
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-basic
          path: examples/basic/playwright-report/
          retention-days: 7

  test-ecommerce:
    name: Test E-commerce Example
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: examples/e-commerce
        run: npm ci

      - name: Install Playwright browsers
        working-directory: examples/e-commerce
        run: npx playwright install --with-deps chromium

      - name: Run tests
        working-directory: examples/e-commerce
        run: npx playwright test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-ecommerce
          path: examples/e-commerce/playwright-report/
          retention-days: 7
